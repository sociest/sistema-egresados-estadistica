events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Límite de subida de archivos
    client_max_body_size 10m;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Compresión
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # ── Redirigir todo HTTP → HTTPS ──────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Solo para verificación Let's Encrypt (si usas Certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Todo lo demás redirige a HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Servidor HTTPS ────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # Certificados SSL (ajusta las rutas a tus certificados reales)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Configuración SSL segura
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Headers de seguridad ─────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           SAMEORIGIN always;
        add_header X-Content-Type-Options    nosniff always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection          "1; mode=block" always;

        # ── Cache de archivos estáticos subidos ──────────────────────────────
        location /uploads/ {
            alias /var/www/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options nosniff;
        }

        # ── Cache de assets de Next.js ────────────────────────────────────────
        location /_next/static/ {
            proxy_pass         http://app:3000;
            proxy_cache_valid  200 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Proxy al servidor Next.js ─────────────────────────────────────────
        location / {
            proxy_pass         http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }
}   