version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: egresados_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB:       egresados_db
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout:  5s
      retries:  5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: egresados_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/egresados_db
      JWT_SECRET:   ${JWT_SECRET}
      NODE_ENV:     production
    volumes:
      - ./public/uploads:/app/public/uploads
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/stats/publicos || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3

  nginx:
    image: nginx:alpine
    container_name: egresados_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./public/uploads:/var/www/uploads:ro

volumes:
  postgres_data: